[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC}"

[etherscan]
mantle_sepolia = { key = "${MANTLE_EXPLORER_API_KEY}", url = "https://explorer.sepolia.mantle.xyz/api" }
