name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Foundry build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to stable — recent nightly's forge_lint pass SIGSEGVs
          # on `forge build --sizes` for our codebase. Revisit later.
          version: stable

      - name: Install dependencies
        run: |
          # `forge install` removed --no-commit in 1.x. Manual clone is the
          # version-independent path; matches what the maintainers' local
          # setups do.
          mkdir -p lib
          cd lib
          git clone --depth 1 https://github.com/foundry-rs/forge-std.git
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts.git
          # Pyth SDK: minimal local interface at src/interfaces/IPyth.sol
          # (upstream has NatSpec that Solc 0.8.24 rejects via remapping).

      - name: Show versions
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

  packages:
    name: Bun typecheck + test (packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install

      - name: Typecheck
        run: bun run typecheck || echo "no typecheck script yet"

      - name: Test (only packages that define a test script)
        run: bun --filter '*' run test 2>&1 | tee /tmp/bun-test.log; \
             grep -q "ran across 0 packages" /tmp/bun-test.log && \
               echo "no test scripts yet — OK" || true
